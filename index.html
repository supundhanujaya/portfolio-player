<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surgical Audio Portfolio</title>
    <style>
    @import url('https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/geist-sans/style.css');

    body { margin: 0; background: transparent; font-family: 'Geist Sans', sans-serif; -webkit-font-smoothing: antialiased; }
    .supun-portfolio-glass { padding: 40px 20px; color: #000; }
    .p-container { max-width: 900px; margin: 0 auto; }

    /* HEADER */
    .p-header { width: 100%; text-align: center; margin-bottom: 60px; }
    .p-badge { display: block; font-size: 10px; font-weight: 800; letter-spacing: 3px; text-transform: uppercase; color: #3351d6; margin-bottom: 8px; }
    .p-header h2 { font-size: 3rem; font-weight: 800; letter-spacing: -0.04em; margin: 0; line-height: 1.1; }
    .p-accent { background: linear-gradient(135deg, #3351d6 0%, #9c27b0 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .p-header-line { height: 2px; width: 40px; background: linear-gradient(90deg, #3351d6, #9c27b0); margin: 20px auto 0 auto; border-radius: 10px; }

    /* TRACK ITEM */
    .p-item { display: flex; justify-content: space-between; align-items: center; padding: 30px 0; gap: 30px; }
    .p-divider { height: 1px; background: rgba(0,0,0,0.08); margin: 0; }
    .p-info { flex: 1; }
    .p-info h3 { margin: 4px 0 0 0; font-size: 1.3rem; font-weight: 800; color: #000; }
    .p-category { font-size: 10px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 1.5px; }

    .p-controls { display: flex; align-items: center; gap: 15px; flex-shrink: 0; }

    /* RESPONSIVE SWITCH FIX */
    .p-switch { 
        position: relative; 
        display: flex; 
        background: #f0f0f0; 
        padding: 4px; 
        border-radius: 8px; 
        width: 160px; /* Base width */
        height: 42px; 
        box-sizing: border-box;
        border: 1px solid rgba(0,0,0,0.03); 
        align-items: center;
        overflow: hidden;
    }
    .p-radio { display: none !important; }
    .p-label { 
        flex: 1; 
        text-align: center; 
        font-size: 9px; 
        font-weight: 900; 
        color: #777; 
        cursor: pointer; 
        z-index: 2; 
        transition: 0.3s;
        line-height: 34px; /* Matches inner height */
    }
    .p-slider { 
        position: absolute; 
        top: 4px; 
        left: 4px; 
        width: calc(50% - 4px); /* Exactly half minus padding */
        height: calc(100% - 8px); 
        background: linear-gradient(135deg, #3351d6 0%, #9c27b0 100%); 
        border-radius: 6px; 
        transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); 
        z-index: 1; 
    }
    
    /* Percentage based movement for any width */
    .p-switch input:nth-of-type(2):checked ~ .p-slider { transform: translateX(100%); }
    .p-radio:checked + .p-label { color: #fff !important; }

    /* PLAYER */
    .custom-player {
        display: flex;
        align-items: center;
        gap: 12px;
        width: 340px; 
        height: 42px; 
        background: #f0f0f0;
        padding: 0 16px;
        border-radius: 8px; 
        border: 1px solid rgba(0,0,0,0.05);
        box-sizing: border-box;
    }
    .custom-player audio { display: none !important; }
    .play-btn { background: #000; border: none; width: 28px; height: 28px; border-radius: 6px; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: 0.2s; }
    .play-btn:hover { background: #3351d6; }
    .progress-area { flex-grow: 1; height: 4px; background: rgba(0,0,0,0.1); border-radius: 2px; cursor: pointer; position: relative; overflow: hidden; }
    .progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #3351d6, #9c27b0); }
    .p-time { font-size: 10px; font-weight: 700; color: #666; font-variant-numeric: tabular-nums; min-width: 70px; text-align: right; }

    /* MOBILE ADJUSTMENTS */
    @media (max-width: 850px) {
        .p-header h2 { font-size: 2.2rem; }
        .p-item { flex-direction: column; text-align: center; gap: 20px; padding: 40px 0; }
        .p-controls { flex-direction: column; width: 100%; gap: 12px; }
        .custom-player { width: 100%; max-width: 350px; }
        .p-switch { width: 100%; max-width: 350px; } /* Now scales perfectly */
    }
</style>
</head>
<body>

<section class="supun-portfolio-glass">
    <div class="p-container">
        <header class="p-header">
            <span class="p-badge">Portfolio</span>
            <h2>Studio <span class="p-accent">Results.</span></h2>
            <div class="p-header-line"></div>
        </header>

        <div class="p-list" id="track-list"></div>
    </div>
</section>

<script>
// Tracks data and functionality remain identical to previous working version
const tracks = [
    {
        title: "Back Home To Blue",
        category: "Folk",
        before: "https://www.dropbox.com/scl/fi/mw4n869ujpuqhgp6x48ih/Back-Home-to-Blue-Before.mp3?rlkey=ukhpbofa0gjt8kqblymh6ttpg&st=1xyiv8to&dl=0", 
        after: "https://www.dropbox.com/scl/fi/9kpr4n767h81yyh23a8iz/Back-Home-to-Blue-After.mp3?rlkey=xtbucx900ztzrwsea7apclal9&st=32cbxdo8&dl=0"
    }
    
    {
        title: "Who I Am",
        category: "Country",
        before: "https://www.dropbox.com/scl/fi/k546tia03lye2fy8wj1vt/Who-I-Am-Before.mp3?rlkey=c1jedscpv6yibrwsaukx19ti4&st=f3pfm84r&dl=0", 
        after: "https://www.dropbox.com/scl/fi/8qrdwh6ygbyi3twnn5cm3/Who-I-Am-After.mp3?rlkey=9o0ogmdqy71vz0sfi7rlmttsd&st=ogtrok1b&dl=0"
    }
    
    {
        title: "Eyeliner",
        category: "EDM / Electronic",
        before: "https://www.dropbox.com/scl/fi/6oh5verld6nxcjw65arfv/Eyeliner-Before.mp3?rlkey=flq5dwa2p05i5zh4mlujhpgdv&st=cd52qxep&dl=0", 
        after: "https://www.dropbox.com/scl/fi/v5a07rn9uwyw3vzfhfe3b/Eyeliner-After.mp3?rlkey=1u4pvdgex27ieqjc54kzjzby7&st=4hj7mjn7&dl=0"
    }
    
    {
        title: "Same Kind of Life",
        category: "Pop / Singer-Songwriter",
        before: "https://www.dropbox.com/scl/fi/aubg4bgvft35185imn0c9/Same-Kind-Of-Life-Before.mp3?rlkey=akm1mnl5d8ciuhsd3qhge8aa4&st=hqpmjevh&dl=0", 
        after: "https://www.dropbox.com/scl/fi/3nhqtjaxje5jt8uowbx0v/Same-Kind-Of-Life-After.mp3?rlkey=9e1cm6urhcrpk142zjnzdrlcp&st=v5o4jtg0&dl=0"
    }
    
    {
        title: "Lunch Sheet",
        category: "Hiphop / Rap",
        before: "https://www.dropbox.com/scl/fi/5arrp7ngs4urwf69wo88s/Lunch-Sheet-Before.mp3?rlkey=qfoew6hcotvm6o460ichwh32j&st=ukw1jsn6&dl=0", 
        after: "https://www.dropbox.com/scl/fi/vby8yhpbll5y8ulnwdq9c/Lunch-Sheet-After.mp3?rlkey=nyz2wjv3zjggmgz68q02eks74&st=rp09f2pj&dl=0"
    }
];

function fixLink(url) {
    if (!url || url.includes("PASTE")) return "";
    return url.replace('dl=0', 'raw=1').replace('www.dropbox.com', 'dl.dropboxusercontent.com');
}

function formatTime(seconds) {
    if (isNaN(seconds)) return "0:00";
    const mins = Math.floor(seconds / 60);
    const secs = Math.floor(seconds % 60);
    return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
}

const trackList = document.getElementById("track-list");

tracks.forEach((track, index) => {
    const trackId = index + 1;
    trackList.insertAdjacentHTML("beforeend", `
    <div class="p-item">
        <div class="p-info">
            <span class="p-category">${track.category}</span>
            <h3>${track.title}</h3>
        </div>
        <div class="p-controls">
            <div class="p-switch">
                <input type="radio" name="track-${trackId}" id="t-${trackId}-b" class="p-radio" onchange="syncAudio(${trackId}, '${fixLink(track.before)}')">
                <label for="t-${trackId}-b" class="p-label">BEFORE</label>
                <input type="radio" name="track-${trackId}" id="t-${trackId}-a" class="p-radio" checked onchange="syncAudio(${trackId}, '${fixLink(track.after)}')">
                <label for="t-${trackId}-a" class="p-label">AFTER</label>
                <span class="p-slider"></span>
            </div>
            <div class="custom-player">
                <button class="play-btn" onclick="togglePlay(${trackId})">
                    <svg viewBox="0 0 24 24" width="14" height="14" id="icon-${trackId}"><path d="M8 5v14l11-7z" fill="currentColor"/></svg>
                </button>
                <div class="progress-area" onclick="seek(event, ${trackId})">
                    <div class="progress-bar" id="progress-${trackId}"></div>
                </div>
                <div class="p-time" id="time-${trackId}">0:00 / 0:00</div>
                <audio id="audio-${trackId}" ontimeupdate="updateProgress(${trackId})" onloadedmetadata="updateProgress(${trackId})" onended="resetPlayer(${trackId})">
                    <source src="${fixLink(track.after)}" type="audio/mpeg">
                </audio>
            </div>
        </div>
    </div>
    <div class="p-divider"></div>`);
});

function togglePlay(id) {
    const audio = document.getElementById('audio-' + id);
    const path = document.querySelector(`#icon-${id} path`);
    if (audio.paused) {
        audio.play();
        path.setAttribute('d', 'M6 19h4V5H6v14zm8-14v14h4V5h-4z');
    } else {
        audio.pause();
        path.setAttribute('d', 'M8 5v14l11-7z');
    }
}

function updateProgress(id) {
    const audio = document.getElementById('audio-' + id);
    const bar = document.getElementById('progress-' + id);
    const timeDisplay = document.getElementById('time-' + id);
    
    if (audio.duration) {
        bar.style.width = (audio.currentTime / audio.duration * 100) + '%';
        timeDisplay.innerText = `${formatTime(audio.currentTime)} / ${formatTime(audio.duration)}`;
    }
}

function seek(e, id) {
    const audio = document.getElementById('audio-' + id);
    audio.currentTime = (e.offsetX / e.currentTarget.clientWidth) * audio.duration;
}

function syncAudio(id, newSrc) {
    const audio = document.getElementById('audio-' + id);
    const time = audio.currentTime;
    const playing = !audio.paused;
    audio.src = newSrc;
    audio.load();
    audio.onloadeddata = () => { audio.currentTime = time; if (playing) audio.play(); };
}

function resetPlayer(id) {
    document.querySelector(`#icon-${id} path`).setAttribute('d', 'M8 5v14l11-7z');
    document.getElementById('progress-' + id).style.width = '0%';
}
</script>
</body>
</html>
