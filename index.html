<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surgical Audio Portfolio</title>
    <style>
        @import url('https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/geist-sans/style.css');

        body { margin: 0; background: transparent; font-family: 'Geist Sans', sans-serif; -webkit-font-smoothing: antialiased; }
        .supun-portfolio-glass { padding: 40px 20px; color: #000; }
        .p-container { max-width: 900px; margin: 0 auto; }

        .p-item { display: flex; justify-content: space-between; align-items: center; padding: 30px 0; gap: 30px; }
        .p-divider { height: 1px; background: rgba(0,0,0,0.08); margin: 0; }
        .p-info { flex: 1; }
        .p-info h3 { margin: 4px 0 0 0; font-size: 1.3rem; font-weight: 800; color: #000; }
        .p-category { font-size: 10px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 1.5px; }

        /* Unified Height for Controls */
        .p-controls { display: flex; align-items: center; gap: 15px; flex-shrink: 0; }

        /* BEFORE/AFTER SWITCH - Centered & Matching Height */
        .p-switch { 
            position: relative; 
            display: flex; 
            background: #f0f0f0; 
            padding: 3px; 
            border-radius: 8px; 
            width: 150px; 
            height: 42px; /* Fixed height */
            box-sizing: border-box;
            border: 1px solid rgba(0,0,0,0.03); 
            align-items: center;
        }
        .p-radio { display: none !important; }
        .p-label { 
            flex: 1; 
            text-align: center; 
            font-size: 9px; 
            font-weight: 900; 
            color: #777; 
            cursor: pointer; 
            z-index: 2; 
            transition: 0.3s;
            line-height: 36px; /* Vertical centering */
        }
        .p-slider { 
            position: absolute; 
            top: 3px; 
            left: 3px; 
            width: 71px; /* Precision width */
            height: 34px; /* Precision height */
            background: linear-gradient(135deg, #3351d6 0%, #9c27b0 100%); 
            border-radius: 6px; 
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); 
            z-index: 1; 
        }
        
        /* Fixed "After" selection centering */
        .p-switch input:nth-of-type(2):checked ~ .p-slider { transform: translateX(73px); }
        .p-radio:checked + .p-label { color: #fff !important; }

        /* PLAYER UI - Matching Height & Square Design */
        .custom-player {
            display: flex !important;
            align-items: center;
            gap: 12px;
            width: 340px; 
            height: 42px; /* Matches the Switch height exactly */
            background: #f0f0f0;
            padding: 0 16px;
            border-radius: 8px; 
            border: 1px solid rgba(0,0,0,0.05);
            box-sizing: border-box;
        }

        .custom-player audio { display: none !important; }

        .play-btn {
            background: #000;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 6px; 
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: 0.2s;
        }
        .play-btn:hover { background: #3351d6; }

        .progress-area { flex-grow: 1; height: 4px; background: rgba(0,0,0,0.1); border-radius: 2px; cursor: pointer; position: relative; overflow: hidden; }
        .progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #3351d6, #9c27b0); }

        .p-time { 
            font-size: 10px; 
            font-weight: 700; 
            color: #666; 
            font-variant-numeric: tabular-nums; 
            min-width: 70px; 
            text-align: right; 
        }

        /* Mobile Adjustments */
        @media (max-width: 850px) {
            .p-item { flex-direction: column; text-align: center; gap: 20px; }
            .p-controls { flex-direction: column; width: 100%; }
            .custom-player, .p-switch { width: 100%; max-width: 350px; }
        }
    </style>
</head>
<body>

<section class="supun-portfolio-glass">
    <div class="p-container">
        <div class="p-header">
            <span class="p-badge">Portfolio</span>
            <h2>Studio <span class="p-accent">Results.</span></h2>
            <div class="p-header-line"></div>
        </div>
        <div class="p-list" id="track-list"></div>
    </div>
</section>

<script>
const tracks = [
    {
        title: "Back Home To Blue",
        category: "Americana / Country",
        before: "https://www.dropbox.com/scl/fi/vtl2yv1squy8mhs0ops7h/TheLongWait_BackHomeToBlue_Full-master.mp3?rlkey=qp4ob4w0fkpd818c9si15974l&st=f1hmwzkw&dl=0", 
        after: "https://www.dropbox.com/scl/fi/vtl2yv1squy8mhs0ops7h/TheLongWait_BackHomeToBlue_Full-master.mp3?rlkey=qp4ob4w0fkpd818c9si15974l&st=f1hmwzkw&dl=0"
    }
];

function fixLink(url) {
    if (!url || url.includes("PASTE")) return "";
    return url.replace('dl=0', 'raw=1').replace('www.dropbox.com', 'dl.dropboxusercontent.com');
}

function formatTime(seconds) {
    if (isNaN(seconds)) return "0:00";
    const mins = Math.floor(seconds / 60);
    const secs = Math.floor(seconds % 60);
    return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
}

const trackList = document.getElementById("track-list");

tracks.forEach((track, index) => {
    const trackId = index + 1;
    trackList.insertAdjacentHTML("beforeend", `
    <div class="p-item">
        <div class="p-info">
            <span class="p-category">${track.category}</span>
            <h3>${track.title}</h3>
        </div>
        <div class="p-controls">
            <div class="p-switch">
                <input type="radio" name="track-${trackId}" id="t-${trackId}-b" class="p-radio" onchange="syncAudio(${trackId}, '${fixLink(track.before)}')">
                <label for="t-${trackId}-b" class="p-label">BEFORE</label>
                <input type="radio" name="track-${trackId}" id="t-${trackId}-a" class="p-radio" checked onchange="syncAudio(${trackId}, '${fixLink(track.after)}')">
                <label for="t-${trackId}-a" class="p-label">AFTER</label>
                <span class="p-slider"></span>
            </div>
            <div class="custom-player">
                <button class="play-btn" onclick="togglePlay(${trackId})">
                    <svg viewBox="0 0 24 24" width="14" height="14" id="icon-${trackId}"><path d="M8 5v14l11-7z" fill="currentColor"/></svg>
                </button>
                <div class="progress-area" onclick="seek(event, ${trackId})">
                    <div class="progress-bar" id="progress-${trackId}"></div>
                </div>
                <div class="p-time" id="time-${trackId}">0:00 / 0:00</div>
                <audio id="audio-${trackId}" ontimeupdate="updateProgress(${trackId})" onloadedmetadata="updateProgress(${trackId})" onended="resetPlayer(${trackId})">
                    <source src="${fixLink(track.after)}" type="audio/mpeg">
                </audio>
            </div>
        </div>
    </div>
    <div class="p-divider"></div>`);
});

function togglePlay(id) {
    const audio = document.getElementById('audio-' + id);
    const path = document.querySelector(`#icon-${id} path`);
    if (audio.paused) {
        audio.play();
        path.setAttribute('d', 'M6 19h4V5H6v14zm8-14v14h4V5h-4z');
    } else {
        audio.pause();
        path.setAttribute('d', 'M8 5v14l11-7z');
    }
}

function updateProgress(id) {
    const audio = document.getElementById('audio-' + id);
    const bar = document.getElementById('progress-' + id);
    const timeDisplay = document.getElementById('time-' + id);
    
    if (audio.duration) {
        bar.style.width = (audio.currentTime / audio.duration * 100) + '%';
        timeDisplay.innerText = `${formatTime(audio.currentTime)} / ${formatTime(audio.duration)}`;
    }
}

function seek(e, id) {
    const audio = document.getElementById('audio-' + id);
    audio.currentTime = (e.offsetX / e.currentTarget.clientWidth) * audio.duration;
}

function syncAudio(id, newSrc) {
    const audio = document.getElementById('audio-' + id);
    const time = audio.currentTime;
    const playing = !audio.paused;
    audio.src = newSrc;
    audio.load();
    audio.onloadeddata = () => { audio.currentTime = time; if (playing) audio.play(); };
}

function resetPlayer(id) {
    document.querySelector(`#icon-${id} path`).setAttribute('d', 'M8 5v14l11-7z');
    document.getElementById('progress-' + id).style.width = '0%';
}
</script>
</body>
</html>
