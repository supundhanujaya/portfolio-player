<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surgical Audio Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="supun-portfolio-glass">
    <div class="p-container">
        <div class="p-header">
            <span class="p-badge">Portfolio</span>
            <h2>Studio <span class="p-accent">Results.</span></h2>
            <div class="p-header-line"></div>
        </div>

        <div class="p-list" id="track-list">
            </div>
    </div>
</section>

<script>
// ====== TRACK DATA ======
// Tip: Use Dropbox (with ?raw=1) or a dedicated host for better reliability than Google Drive
const tracks = [
    {
        title: "My Song",
        category: "Trap",
        before: "https://drive.google.com/uc?export=download&id=13u1aC2Q15noodKjBsbSDx8m_7BgM5lVj",
        after: "https://drive.google.com/uc?export=download&id=18vaUoijy4bDYJG5MJ7r8m9wB8iklW00U"
    },
    {
        title: "Another Song",
        category: "Pop",
        before: "BEFORE_LINK_2",
        after: "AFTER_LINK_2"
    }
];

const trackList = document.getElementById("track-list");

// ====== GENERATION LOGIC ======
tracks.forEach((track, index) => {
    const trackId = index + 1;
    const html = `
    <div class="p-item">
        <div class="p-info">
            <span class="p-category">${track.category}</span>
            <h3>${track.title}</h3>
        </div>
        <div class="p-controls">
            <div class="p-switch">
                <input type="radio" name="track-${trackId}" id="t-${trackId}-b" class="p-radio" 
                    onchange="syncAudio(${trackId}, '${track.before}')">
                <label for="t-${trackId}-b" class="p-label">BEFORE</label>

                <input type="radio" name="track-${trackId}" id="t-${trackId}-a" class="p-radio" checked 
                    onchange="syncAudio(${trackId}, '${track.after}')">
                <label for="t-${trackId}-a" class="p-label">AFTER</label>

                <span class="p-slider"></span>
            </div>
            <audio id="audio-${trackId}" controls class="p-audio-glass">
                <source src="${track.after}" type="audio/mpeg">
            </audio>
        </div>
    </div>
    <div class="p-divider"></div>`;
    trackList.insertAdjacentHTML("beforeend", html);
});

// ====== SURGICAL SYNC FUNCTION ======
function syncAudio(id, newSrc) {
    const player = document.getElementById('audio-' + id);
    const time = player.currentTime;
    const isPlaying = !player.paused;

    player.src = newSrc;
    player.load();
    
    player.addEventListener('loadedmetadata', function() {
        this.currentTime = time;
        if (isPlaying) this.play();
    }, { once: true });
}
</script>
</body>
</html>
