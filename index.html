<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surgical Audio Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="supun-portfolio-glass">
    <div class="p-container">
        <div class="p-header">
            <span class="p-badge">Portfolio</span>
            <h2>Studio <span class="p-accent">Results.</span></h2>
            <div class="p-header-line"></div>
        </div>
        <div class="p-list" id="track-list"></div>
    </div>
</section>

<script>
// ====== TRACK DATA ======
const tracks = [
    {
        title: "Back Home To Blue",
        category: "Americana / Country",
        before: "https://www.dropbox.com/scl/fi/vtl2yv1squy8mhs0ops7h/TheLongWait_BackHomeToBlue_Full-master.mp3?rlkey=qp4ob4w0fkpd818c9si15974l&st=f1hmwzkw&dl=0", 
        after: "https://www.dropbox.com/scl/fi/vtl2yv1squy8mhs0ops7h/TheLongWait_BackHomeToBlue_Full-master.mp3?rlkey=qp4ob4w0fkpd818c9si15974l&st=f1hmwzkw&dl=0"
    }
];

// This function fixes Dropbox links automatically
function fixLink(url) {
    if (!url) return "";
    return url.replace('dl=0', 'raw=1').replace('www.dropbox.com', 'dl.dropboxusercontent.com');
}

const trackList = document.getElementById("track-list");

tracks.forEach((track, index) => {
    const trackId = index + 1;
    const initialSrc = fixLink(track.after);

    const html = `
    <div class="p-item">
        <div class="p-info">
            <span class="p-category">${track.category}</span>
            <h3>${track.title}</h3>
        </div>
        <div class="p-controls">
            <div class="p-switch">
                <input type="radio" name="track-${trackId}" id="t-${trackId}-b" class="p-radio" 
                    onchange="syncAudio(${trackId}, '${fixLink(track.before)}')">
                <label for="t-${trackId}-b" class="p-label">BEFORE</label>

                <input type="radio" name="track-${trackId}" id="t-${trackId}-a" class="p-radio" checked 
                    onchange="syncAudio(${trackId}, '${fixLink(track.after)}')">
                <label for="t-${trackId}-a" class="p-label">AFTER</label>

                <span class="p-slider"></span>
            </div>
            <audio id="audio-${trackId}" controls class="p-audio-glass" preload="auto">
                <source src="${initialSrc}" type="audio/mpeg">
                Your browser does not support the audio element.
            </audio>
        </div>
    </div>
    <div class="p-divider"></div>`;
    trackList.insertAdjacentHTML("beforeend", html);
});

function syncAudio(id, newSrc) {
    const player = document.getElementById('audio-' + id);
    if (!newSrc || newSrc === "") return;
    
    const time = player.currentTime;
    const isPlaying = !player.paused;

    player.src = newSrc;
    player.load(); // Forces the player to acknowledge the new source
    
    player.onloadeddata = function() {
        this.currentTime = time;
        if (isPlaying) this.play().catch(e => console.log("Playback interrupted"));
    };
}
</script>
</body>
</html>
